<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App — Day 10</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 20px;
        }

        .app {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #e8edf5;
        }

        h1 span { color: #00c9a7; }

        .subtitle {
            font-size: 14px;
            color: #6b7a99;
            margin-bottom: 28px;
        }

        /* input area */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 8px;
            color: #e8edf5;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-area input::placeholder { color: #6b7a99; }

        .input-area input:focus { border-color: #00c9a7; }

        .add-btn {
            padding: 12px 20px;
            background: #00c9a7;
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .add-btn:hover { background: #00a88b; transform: translateY(-2px); }

        /* filter tabs */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 6px 16px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 20px;
            color: #6b7a99;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #00c9a7;
            border-color: #00c9a7;
            color: #0b0f19;
            font-weight: 600;
        }

        /* stats bar */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 13px;
            color: #6b7a99;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #6b7a99;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .clear-btn:hover { color: #ff6b6b; }

        /* todo list */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        .todo-item:hover { border-color: #00c9a7; }

        .todo-item.done { opacity: 0.5; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* checkbox */
        .check-btn {
            width: 22px;
            height: 22px;
            border: 2px solid #1e2740;
            border-radius: 50%;
            background: none;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: transparent;
        }

        .todo-item.done .check-btn {
            background: #00c9a7;
            border-color: #00c9a7;
            color: #0b0f19;
        }

        /* todo text */
        .todo-text {
            flex: 1;
            font-size: 15px;
            color: #e8edf5;
            transition: all 0.3s ease;
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: #6b7a99;
        }

        /* priority badge */
        .priority {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .priority.high { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }
        .priority.medium { background: rgba(255, 200, 0, 0.15); color: #ffc800; }
        .priority.low { background: rgba(0, 201, 167, 0.15); color: #00c9a7; }

        /* delete button */
        .delete-btn {
            background: none;
            border: none;
            color: #6b7a99;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s ease;
            flex-shrink: 0;
        }

        .delete-btn:hover { color: #ff6b6b; }

        /* empty state */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #6b7a99;
            font-size: 15px;
        }

        .empty span { font-size: 36px; display: block; margin-bottom: 10px; }

        /* priority selector */
        .priority-select {
            padding: 12px 10px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 8px;
            color: #9aaac4;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app">
        <h1>my <span>todos</span></h1>
        <p class="subtitle">stay organized. get things done.</p>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="add a new task..." />
            <select class="priority-select" id="prioritySelect">
                <option value="low">🟢 low</option>
                <option value="medium" selected>🟡 medium</option>
                <option value="high">🔴 high</option>
            </select>
            <button class="add-btn" id="addBtn">+</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">all</button>
            <button class="filter-btn" data-filter="active">active</button>
            <button class="filter-btn" data-filter="done">done</button>
        </div>

        <div class="stats">
            <span id="statsText">0 tasks</span>
            <button class="clear-btn" id="clearDone">clear done</button>
        </div>

        <div class="todo-list" id="todoList"></div>
    </div>

    <script src="todo.js"></script>

</body>
</html>
