<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App — Day 10</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 20px;
        }

        .app {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #e8edf5;
        }

        h1 span { color: #00c9a7; }

        .subtitle {
            font-size: 14px;
            color: #6b7a99;
            margin-bottom: 28px;
        }

        /* input area */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 8px;
            color: #e8edf5;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-area input::placeholder { color: #6b7a99; }

        .input-area input:focus { border-color: #00c9a7; }

        .add-btn {
            padding: 12px 20px;
            background: #00c9a7;
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }
         .add-btn:hover { background: #00a88b; transform: translateY(-2px); }

        /* filter tabs */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 6px 16px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 20px;
            color: #6b7a99;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #00c9a7;
            border-color: #00c9a7;
            color: #0b0f19;
            font-weight: 600;
        }
