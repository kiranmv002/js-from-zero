<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App — Day 16</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 50px 20px;
        }

        .app {
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        h1 span { color: #00c9a7; }

        .subtitle {
            font-size: 13px;
            color: #6b7a99;
            margin-bottom: 24px;
        }

        /* search */
        .search-area {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .search-area input {
            flex: 1;
            padding: 12px 16px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 8px;
            color: #e8edf5;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-area input::placeholder { color: #6b7a99; }

        .search-area input:focus { border-color: #00c9a7; }

        .search-btn {
            padding: 12px 20px;
            background: #00c9a7;
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            white-space: nowrap;
        }

        .search-btn:hover { background: #00a88b; }

        /* loading and error */
        .status {
            text-align: center;
            padding: 20px;
            color: #6b7a99;
            font-size: 14px;
            display: none;
        }

        .status.error { color: #ff6b6b; }

        /* weather card */
        .weather-card {
            background: #0e1422;
            border: 1px solid #1e2740;
            border-radius: 16px;
            padding: 28px;
            display: none;
        }

        .weather-card.show { display: block; }

        .city-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .city-name {
            font-size: 26px;
            font-weight: 700;
        }

        .country {
            font-size: 14px;
            color: #6b7a99;
            margin-top: 2px;
        }

        .date-time {
            font-size: 12px;
            color: #6b7a99;
            text-align: right;
        }

        /* main weather */
        .main-weather {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 20px;
            background: #131929;
            border-radius: 12px;
        }

        .weather-icon {
            font-size: 60px;
            line-height: 1;
        }

        .temp {
            font-size: 56px;
            font-weight: 300;
            line-height: 1;
            color: #00c9a7;
        }

        .temp sup {
            font-size: 24px;
            font-weight: 400;
        }

        .feels-like {
            font-size: 13px;
            color: #6b7a99;
            margin-top: 4px;
        }

        .description {
            font-size: 15px;
            color: #9aaac4;
            text-transform: capitalize;
            margin-top: 4px;
        }

        /* stats grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 10px;
            padding: 14px 16px;
        }

        .stat-label {
            font-size: 11px;
            color: #6b7a99;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 500;
            color: #e8edf5;
        }

        .stat-unit {
            font-size: 12px;
            color: #6b7a99;
            margin-left: 2px;
        }

        /* min max row */
        .min-max {
            display: flex;
            gap: 10px;
        }

        .min-max-item {
            flex: 1;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 10px;
            padding: 12px 16px;
            text-align: center;
        }

        .min-max-label {
            font-size: 11px;
            color: #6b7a99;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .min-max-value {
            font-size: 20px;
            font-weight: 500;
        }

        .min-max-value.min { color: #64b5f6; }
        .min-max-value.max { color: #ff6b6b; }

        /* recent searches */
        .recent {
            margin-top: 20px;
        }

        .recent-label {
            font-size: 11px;
            color: #6b7a99;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .recent-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 5px 14px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 20px;
            font-size: 13px;
            color: #9aaac4;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chip:hover {
            border-color: #00c9a7;
            color: #00c9a7;
        }
    </style>
</head>
<body>

    <div class="app">
        <h1>weather <span>app</span></h1>
        <p class="subtitle">search any city to get current weather</p>

        <div class="search-area">
            <input type="text" id="cityInput" placeholder="enter city name..." />
            <button class="search-btn" id="searchBtn">search</button>
        </div>

        <div class="status" id="status"></div>

        <div class="weather-card" id="weatherCard">
            <div class="city-row">
                <div>
                    <div class="city-name" id="cityName"></div>
                    <div class="country" id="country"></div>
                </div>
                <div class="date-time" id="dateTime"></div>
            </div>

            <div class="main-weather">
                <div class="weather-icon" id="weatherIcon"></div>
                <div>
                    <div class="temp" id="temp"></div>
                    <div class="description" id="description"></div>
                    <div class="feels-like" id="feelsLike"></div>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">humidity</div>
                    <div class="stat-value" id="humidity"></div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">wind speed</div>
                    <div class="stat-value" id="wind"></div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">visibility</div>
                    <div class="stat-value" id="visibility"></div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">pressure</div>
                    <div class="stat-value" id="pressure"></div>
                </div>
            </div>

            <div class="min-max">
                <div class="min-max-item">
                    <div class="min-max-label">min</div>
                    <div class="min-max-value min" id="tempMin"></div>
                </div>
                <div class="min-max-item">
                    <div class="min-max-label">max</div>
                    <div class="min-max-value max" id="tempMax"></div>
                </div>
            </div>
        </div>

        <div class="recent" id="recentSection" style="display:none;">
            <div class="recent-label">recent searches</div>
            <div class="recent-chips" id="recentChips"></div>
        </div>
    </div>

    <script src="weather.js"></script>

</body>
</html>
