<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator — Day 13</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calculator {
            background: #0e1422;
            border: 1px solid #1e2740;
            border-radius: 20px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* display */
        .display {
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 12px;
            padding: 20px 16px 14px;
            margin-bottom: 20px;
            text-align: right;
        }

        .display-expression {
            font-size: 13px;
            color: #6b7a99;
            min-height: 18px;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .display-value {
            font-size: 40px;
            font-weight: 300;
            color: #e8edf5;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* buttons */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 18px 10px;
            border: 1px solid #1e2740;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #131929;
            color: #e8edf5;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn:hover {
            border-color: #00c9a7;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
            background: #1e2740;
        }

        /* operator buttons */
        .btn.operator {
            background: #1e2740;
            color: #00c9a7;
            border-color: #1e2740;
            font-size: 20px;
        }

        .btn.operator:hover { background: #2a3550; }

        /* equals button */
        .btn.equals {
            background: #00c9a7;
            color: #0b0f19;
            border-color: #00c9a7;
            font-size: 20px;
            font-weight: 700;
        }

        .btn.equals:hover { background: #00a88b; }

        /* clear button */
        .btn.clear {
            background: #1e2740;
            color: #ff6b6b;
            border-color: #1e2740;
        }

        .btn.clear:hover { border-color: #ff6b6b; }

        /* zero spans 2 columns */
        .btn.zero { grid-column: span 2; }

        /* history section */
        .history {
            margin-top: 16px;
            max-height: 120px;
            overflow-y: auto;
        }

        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-track { background: transparent; }
        .history::-webkit-scrollbar-thumb { background: #1e2740; border-radius: 2px; }

        .history-item {
            font-size: 12px;
            color: #6b7a99;
            text-align: right;
            padding: 3px 0;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .history-item:hover { color: #00c9a7; }

        .history-empty {
            font-size: 12px;
            color: #2a3550;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <div class="calculator">

        <div class="display">
            <div class="display-expression" id="expression"></div>
            <div class="display-value" id="displayValue">0</div>
        </div>

        <div class="buttons">
            <button class="btn clear" data-action="clear">AC</button>
            <button class="btn clear" data-action="sign">+/-</button>
            <button class="btn clear" data-action="percent">%</button>
            <button class="btn operator" data-action="operator" data-value="/">÷</button>

            <button class="btn" data-action="number" data-value="7">7</button>
            <button class="btn" data-action="number" data-value="8">8</button>
            <button class="btn" data-action="number" data-value="9">9</button>
            <button class="btn operator" data-action="operator" data-value="*">×</button>

            <button class="btn" data-action="number" data-value="4">4</button>
            <button class="btn" data-action="number" data-value="5">5</button>
            <button class="btn" data-action="number" data-value="6">6</button>
            <button class="btn operator" data-action="operator" data-value="-">−</button>

            <button class="btn" data-action="number" data-value="1">1</button>
            <button class="btn" data-action="number" data-value="2">2</button>
            <button class="btn" data-action="number" data-value="3">3</button>
            <button class="btn operator" data-action="operator" data-value="+">+</button>

            <button class="btn zero" data-action="number" data-value="0">0</button>
            <button class="btn" data-action="decimal">.</button>
            <button class="btn equals" data-action="equals">=</button>
        </div>

        <div class="history" id="history">
            <div class="history-empty">no history yet</div>
        </div>

    </div>

    <script src="calculator.js"></script>

</body>
</html>
