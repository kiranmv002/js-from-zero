<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App — Day 18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .app {
            width: 100%;
            max-width: 540px;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 { font-size: 22px; font-weight: 700; }
        h1 span { color: #00c9a7; }

        .score-badge {
            padding: 6px 16px;
            background: rgba(0,201,167,0.1);
            border: 1px solid rgba(0,201,167,0.3);
            border-radius: 20px;
            font-size: 13px;
            color: #00c9a7;
            font-weight: 600;
        }

        /* progress bar */
        .progress-wrap {
            margin-bottom: 28px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7a99;
            margin-bottom: 8px;
        }
