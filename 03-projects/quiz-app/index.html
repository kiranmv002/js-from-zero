<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App — Day 18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .app {
            width: 100%;
            max-width: 540px;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 { font-size: 22px; font-weight: 700; }
        h1 span { color: #00c9a7; }

        .score-badge {
            padding: 6px 16px;
            background: rgba(0,201,167,0.1);
            border: 1px solid rgba(0,201,167,0.3);
            border-radius: 20px;
            font-size: 13px;
            color: #00c9a7;
            font-weight: 600;
        }

        /* progress bar */
        .progress-wrap {
            margin-bottom: 28px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7a99;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1e2740;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00c9a7, #00a88b);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* question card */
        .question-card {
            background: #0e1422;
            border: 1px solid #1e2740;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
        }

        .category-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(0,201,167,0.08);
            border-radius: 10px;
            font-size: 11px;
            color: #00c9a7;
            font-weight: 500;
            margin-bottom: 14px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            color: #e8edf5;
        }

        /* timer */
        .timer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .timer-bar {
            flex: 1;
            height: 3px;
            background: #1e2740;
            border-radius: 10px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: #00c9a7;
            border-radius: 10px;
            transition: width 1s linear, background 0.3s ease;
        }

        .timer-fill.warning { background: #ffc800; }
        .timer-fill.danger { background: #ff6b6b; }

        .timer-text {
            font-size: 13px;
            color: #6b7a99;
            min-width: 24px;
            text-align: right;
        }

        /* options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option {
            padding: 14px 18px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #e8edf5;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover:not(:disabled) {
            border-color: #00c9a7;
            transform: translateX(4px);
        }

        .option-letter {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #1e2740;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #6b7a99;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .option.correct {
            border-color: #00c9a7;
            background: rgba(0,201,167,0.08);
        }

        .option.correct .option-letter {
            background: #00c9a7;
            color: #0b0f19;
        }

        .option.wrong {
            border-color: #ff6b6b;
            background: rgba(255,107,107,0.08);
        }

        .option.wrong .option-letter {
            background: #ff6b6b;
            color: #fff;
        }

        .option:disabled { cursor: default; }

        /* feedback */
        .feedback {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .feedback.correct {
            background: rgba(0,201,167,0.1);
            border: 1px solid rgba(0,201,167,0.3);
            color: #00c9a7;
            display: block;
        }

        .feedback.wrong {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.3);
            color: #ff6b6b;
            display: block;
        }

        /* next button */
        .next-btn {
            width: 100%;
            padding: 14px;
            background: #00c9a7;
            color: #0b0f19;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            display: none;
        }

        .next-btn.show { display: block; }
        .next-btn:hover { background: #00a88b; transform: translateY(-2px); }
