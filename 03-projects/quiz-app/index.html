<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App — Day 18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .app {
            width: 100%;
            max-width: 540px;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 { font-size: 22px; font-weight: 700; }
        h1 span { color: #00c9a7; }

        .score-badge {
            padding: 6px 16px;
            background: rgba(0,201,167,0.1);
            border: 1px solid rgba(0,201,167,0.3);
            border-radius: 20px;
            font-size: 13px;
            color: #00c9a7;
            font-weight: 600;
        }

        /* progress bar */
        .progress-wrap {
            margin-bottom: 28px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7a99;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1e2740;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00c9a7, #00a88b);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* question card */
        .question-card {
            background: #0e1422;
            border: 1px solid #1e2740;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
        }

        .category-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(0,201,167,0.08);
            border-radius: 10px;
            font-size: 11px;
            color: #00c9a7;
            font-weight: 500;
            margin-bottom: 14px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            color: #e8edf5;
        }

        /* timer */
        .timer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .timer-bar {
            flex: 1;
            height: 3px;
            background: #1e2740;
            border-radius: 10px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: #00c9a7;
            border-radius: 10px;
            transition: width 1s linear, background 0.3s ease;
        }

        .timer-fill.warning { background: #ffc800; }
        .timer-fill.danger { background: #ff6b6b; }

        .timer-text {
            font-size: 13px;
            color: #6b7a99;
            min-width: 24px;
            text-align: right;
        }

        /* options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option {
            padding: 14px 18px;
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #e8edf5;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover:not(:disabled) {
            border-color: #00c9a7;
            transform: translateX(4px);
        }

        .option-letter {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #1e2740;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #6b7a99;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .option.correct {
            border-color: #00c9a7;
            background: rgba(0,201,167,0.08);
        }

        .option.correct .option-letter {
            background: #00c9a7;
            color: #0b0f19;
        }

        .option.wrong {
            border-color: #ff6b6b;
            background: rgba(255,107,107,0.08);
        }

        .option.wrong .option-letter {
            background: #ff6b6b;
            color: #fff;
        }

        .option:disabled { cursor: default; }

        /* feedback */
        .feedback {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .feedback.correct {
            background: rgba(0,201,167,0.1);
            border: 1px solid rgba(0,201,167,0.3);
            color: #00c9a7;
            display: block;
        }

        .feedback.wrong {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.3);
            color: #ff6b6b;
            display: block;
        }

        /* next button */
        .next-btn {
            width: 100%;
            padding: 14px;
            background: #00c9a7;
            color: #0b0f19;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            display: none;
        }

        .next-btn.show { display: block; }
        .next-btn:hover { background: #00a88b; transform: translateY(-2px); }

        /* results screen */
        .results {
            display: none;
            text-align: center;
        }

        .results.show { display: block; }

        .result-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .result-title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-subtitle {
            color: #6b7a99;
            font-size: 15px;
            margin-bottom: 28px;
        }

        .result-score {
            font-size: 64px;
            font-weight: 300;
            color: #00c9a7;
            margin-bottom: 4px;
        }

        .result-score span { font-size: 28px; }

        .result-label {
            color: #6b7a99;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .result-stat {
            background: #131929;
            border: 1px solid #1e2740;
            border-radius: 10px;
            padding: 16px 10px;
            text-align: center;
        }

        .result-stat-val {
            font-size: 24px;
            font-weight: 700;
            color: #00c9a7;
            margin-bottom: 4px;
        }

        .result-stat-label {
            font-size: 11px;
            color: #6b7a99;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .restart-btn {
            width: 100%;
            padding: 14px;
            background: #00c9a7;
            color: #0b0f19;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover { background: #00a88b; transform: translateY(-2px); }

        .quiz-area { }
    </style>
</head>
<body>

    <div class="app">

        <!-- quiz area -->
        <div class="quiz-area" id="quizArea">

            <div class="header">
                <h1>js <span>quiz</span></h1>
                <div class="score-badge">score: <span id="scoreDisplay">0</span></div>
            </div>

            <div class="progress-wrap">
                <div class="progress-info">
                    <span id="questionNum">question 1 of 10</span>
                    <span id="correctCount">0 correct</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>

            <div class="question-card">
                <div class="category-tag" id="category"></div>
                <div class="question-text" id="questionText"></div>
                <div class="timer">
                    <div class="timer-bar">
                        <div class="timer-fill" id="timerFill"></div>
                    </div>
                    <div class="timer-text" id="timerText">15</div>
                </div>
            </div>

            <div class="options" id="options"></div>

            <div class="feedback" id="feedback"></div>

            <button class="next-btn" id="nextBtn">next question →</button>

        </div>

        <!-- results -->
        <div class="results" id="results">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-subtitle" id="resultSubtitle"></div>
            <div class="result-score" id="resultScore"></div>
            <div class="result-label">out of 10 questions</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-val" id="statCorrect"></div>
                    <div class="result-stat-label">correct</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-val" id="statWrong"></div>
                    <div class="result-stat-label">wrong</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-val" id="statTime"></div>
                    <div class="result-stat-label">avg time</div>
                </div>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">play again 🔄</button>
        </div>

    </div>

    <script src="quiz.js"></script>

</body>
</html>
