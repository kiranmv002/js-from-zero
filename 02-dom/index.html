<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 8 - DOM Basics</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #0b0f19; color: #e8edf5; }
        .card { background: #131929; padding: 20px; border-radius: 8px; margin: 10px 0; }
        .box { background: #1e2740; padding: 16px; border-radius: 8px; margin: 10px 0; }
        button { padding: 10px 20px; background: #00c9a7; color: #0b0f19; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        a { color: #00c9a7; }
        ul { padding-left: 20px; }
        li { padding: 4px 0; }
        .even { color: #00c9a7; }
    </style>
</head>
<body>
    <h1 id="heading">Day 8 - DOM Basics</h1>
    <p id="para" class="title">this is a paragraph</p>
    <div id="box" class="box">this is a box</div>
    <div class="card">card 1</div>
    <div class="card">card 2</div>
    <a href="#">click me</a>
    <div id="container">
        <p id="ref">reference element</p>
    </div>
    <ul id="list">
        <li class="item">item 1</li>
        <li class="item">item 2</li>
        <li class="item">item 3</li>
        <li class="item">item 4</li>
    </ul>
    <div id="parent">
        <div id="child">child element</div>
        <div id="old">old element</div>
    </div>

    <script src="dom-basics.js"></script>
</body>
</html>
