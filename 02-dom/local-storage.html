<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 11 - Local Storage</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #0b0f19; color: #e8edf5; }
        button { padding: 10px 20px; background: #00c9a7; color: #0b0f19; border: none; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
        button.secondary { background: #131929; color: #9aaac4; border: 1px solid #1e2740; }
        input, textarea { padding: 10px 14px; background: #131929; border: 1px solid #1e2740; border-radius: 6px; color: #e8edf5; font-size: 14px; margin: 5px 0; width: 100%; max-width: 300px; display: block; }
        h3 { color: #00c9a7; margin: 24px 0 8px; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .count-display { font-size: 48px; font-weight: 700; color: #00c9a7; margin: 10px 0; }
        .theme-dark { background: #0b0f19; color: #e8edf5; }
        .theme-light { background: #f0f4f8; color: #0f172a; }
        label { font-size: 13px; color: #6b7a99; display: block; margin-top: 12px; }
    </style>
</head>
<body id="themeBody">

    <h1>Day 11 — Local Storage</h1>

    <h3>theme toggle</h3>
    <button onclick="saveTheme('theme-dark')">🌙 dark</button>
    <button onclick="saveTheme('theme-light')">☀️ light</button>

    <h3>persistent counter</h3>
    <div class="count-display" id="countDisplay">0</div>
    <button onclick="handleIncrement()">+ increment</button>
    <button onclick="handleDecrement()">- decrement</button>
    <button class="secondary" onclick="handleReset()">reset</button>

    <h3>auto save form</h3>
    <label>username</label>
    <input type="text" id="username" placeholder="your username">
    <label>email</label>
    <input type="email" id="email" placeholder="your email">
    <label>bio</label>
    <textarea id="bio" rows="3" placeholder="tell us about yourself..."></textarea>
    <p style="font-size:13px; color:#6b7a99; margin-top:8px;">
        ✅ type something then refresh — your data stays!
    </p>

    <script src="local-storage.js"></script>
    <script>
        // update count display on load
        document.getElementById('countDisplay').textContent = getCount()

        function handleIncrement() {
            document.getElementById('countDisplay').textContent = increment()
        }
        function handleDecrement() {
            document.getElementById('countDisplay').textContent = decrement()
        }
        function handleReset() {
            resetCount()
            document.getElementById('countDisplay').textContent = 0
        }
    </script>

</body>
</html>
